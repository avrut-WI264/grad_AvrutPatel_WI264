<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUR BANK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container-fluid p-0 d-flex flex-column min-vh-100 main-container shadow">
        
        <header class="header p-4 text-center position-relative">
            <h1 class="fw-bold m-0">OUR BANK</h1>
            <p class="fs-5 m-0">Banking at your Doorstep</p>
            
            <button class="btn btn-dark d-md-none mt-3" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-expanded="false" aria-controls="sidebarMenu">
                 Menu
            </button>
        </header>

        <main class="d-flex flex-column flex-md-row flex-grow-1">
            
            <nav class="sidebar collapse d-md-block" id="sidebarMenu">
                <ul class="list-unstyled mb-0" id="menu">
                    <li class="active p-3 fw-bold border-bottom border-dark" onclick="loadContent('home', this)">HOME</li>
                    <li class="p-3 fw-bold border-bottom border-dark" onclick="loadContent('about', this)">ABOUT US</li>
                    <li class="p-3 fw-bold border-bottom border-dark" onclick="loadContent('services', this)">SERVICES</li>
                    <li class="p-3 fw-bold border-bottom border-dark" onclick="loadContent('netbanking', this)">NETBANKING</li>
                    <li class="p-3 fw-bold" onclick="loadContent('contact', this)">CONTACT US</li>
                </ul>
            </nav>
            
            <section class="content flex-grow-1 d-flex flex-column justify-content-center align-items-center p-4 text-center" id="content-area">
                </section>
        </main>

        <footer class="footer p-3 text-center">
            <h2 class="fs-4 m-0">www.ourbank.com</h2>
            <p class="m-0">@Copyright. All rights reserved.</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
